[build]
  publish = "."

[[redirects]]
  from = "https://www.hwaseong-drain.co.kr/*"
  to = "https://hwaseong-drain.co.kr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
